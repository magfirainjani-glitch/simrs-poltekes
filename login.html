<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRS - Login</title>
    <link rel="stylesheet" href="index.css" />
    <style>

 .container h2 {
    text-align: center;
    color: black;
    font-size: 24px;
    margin-bottom: 15px;
}

    form {
    width: 300px;
    margin: 0 auto; /* ini yang bikin ke tengah */
    display: flex;
    flex-direction: column;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    border-radius: 15px;
    border: none;
    background-color: palevioletred;
    color: white;
    cursor: pointer;
}
    </style>
</head>
<body>

    <header class="header-menu">
        <div class="title">
            <h4>SIMRS</h4>
        </div>
        <div class="menu">
            <a class="active" href="login.html">Login</a>
            <a href="/index.html">Home</a>
            <a href="/pengguna.html">Pengguna</a>
            <a href="/pendaftaran.html">Pendaftaran</a>
            <a href="/rawatjalan.html">Rawat Jalan</a>
        </div>
        <div class="button-auth">
            <button>Logout</button>
        </div>
    </header>

    <div class="container">
        <h2>Login</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Masuk</button>
        <p id="error-msg"></p>
    </form>
</div>
