<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRS - Pengguna</title>
    <link rel="stylesheet" href="index.css" />
    <style>
.container {
    padding: 20px;
}

/* TABEL MODERN */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* HEADER */
th {
    background: linear-gradient(to right, palevioletred, hotpink);
    color: white;
    padding: 12px;
    font-weight: 600;
    font-size: 14px;
}

/* ISI */
td {
    padding: 12px;
    font-size: 14px;
    color: #555;
}

/* GARIS HALUS */
td, th {
    border: none;
}

/* ZEBRA STRIPE */
tr:nth-child(even) {
    background-color: #fff0f5;
}

/* HOVER EFFECT */
tr:hover {
    background-color: #ffe4ec;
    transition: 0.2s;
}

/* STATUS BADGE */
td:last-child {
    font-weight: bold;

}
</style>
</head>
<body>
    <header class="header-menu">
        <div class="title">
            <h4>SIMRS</h4>
        </div>
        <div class="menu">
             <a href="/login.html">Login</a>
            <a href="/index.html">Home</a>
            <a class="active" href="/pengguna.html">Pengguna</a>
            <a href="/pendaftaran.html">Pendaftaran</a>
            <a href="rawatjalan.html">Rawat Jalan</a>
        </div>
        <div class="button-auth">
            <button>Logout</button>
        </div>
    </header>

    <div class="container">
        <h2>Data Pengguna</h2>

        <table>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Jabatan</th>
                <th>Poliklinik</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Dr. Fira</td>
                <td>Dokter</td>
                <td>Poli Dalam</td>
                <td>Aktif</td>
            </tr>
            <tr>
                <td>2</td>
                <td>grace</td>
                <td>Perawat</td>
                <td>Poli Anak</td>
                <td>Aktif</td>
            </tr>
            <tr>
                <td>3</td>
                <td>citra</td>
                <td>Admin</td>
                <td>Poli Gigi</td>
                <td>Tidak Aktif</td>
            </tr>
        </table>
    </div>
</body>
</html>
