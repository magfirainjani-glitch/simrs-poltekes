<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMRS - pendaftaran</title>
    <link rel="stylesheet" href="index.css" />
    <style>
.container {
    padding: 20px;
}

/* TABEL MODERN */
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    background-color: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
}

/* HEADER */
th {
    background: linear-gradient(to right, palevioletred, hotpink);
    color: white;
    padding: 12px;
    font-weight: 600;
    font-size: 14px;
}

/* ISI */
td {
    padding: 12px;
    font-size: 14px;
    color: #555;
}

/* GARIS HALUS */
td, th {
    border: none;
}

/* ZEBRA STRIPE */
tr:nth-child(even) {
    background-color: #fff0f5;
}

/* HOVER EFFECT */
tr:hover {
    background-color: #ffe4ec;
    transition: 0.2s;
}

/* STATUS BADGE */
td:last-child {
    font-weight: bold;
}

td:last-child:contains("Aktif") {
    color: green;
}

td:last-child:contains("Tidak Aktif") {
    color: red;
}
</style>
</head>
<body>

    <header class="header-menu">
        <div class="title">
            <h4>SIMRS</h4>
        </div>
        <div class="menu">
            <a href="/login.html">Login</a>
            <a href="/index.html">Home</a>
            <a href="/pengguna.html">Pengguna</a>
            <a class="active" href="pendaftaran.html">Pendaftaran</a>
            <a href="/rawatjalan.html">Rawat Jalan</a>
        </div>
        <div class="button-auth">
            <button>Logout</button>
        </div>
    </header>

    <div class="container">
        <h2>Form Pendaftaran Pasien</h2>

    <form id="formPasien">

        <label>Nama Lengkap</label>
        <input type="text" required>

        <label>NIK</label>
        <input type="text" required>

        <label>Jenis Kelamin</label>
        <select required>
            <option value="">-- Pilih --</option>
            <option>Laki-laki</option>
            <option>Perempuan</option>
        </select>

        <label>Tanggal Lahir</label>
        <input type="date" required>

        <label>Alamat</label>
        <input type="text" required>

        <label>No. HP</label>
        <input type="tel" required>

        <label>Poli Tujuan</label>
        <select required>
            <option value="">-- Pilih Poli --</option>
            <option>Poli Umum</option>
            <option>Poli Gigi</option>
            <option>Poli Anak</option>
            <option>Poli Kandungan</option>
        </select>

        <button type="submit">Daftar</button>

    </form>

    <p id="pesan"></p>
</div>

<script>
    document.getElementById("formPasien").addEventListener("submit", function(e) {
        e.preventDefault();

        document.getElementById("pesan").textContent = "Pendaftaran berhasil!";
    });
</script>


</body>
</html>
